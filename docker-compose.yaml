version: '3.8'

services:
  # llama.cpp LLM Service (Official Image)
  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llm-obs-llamacpp
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    command: >
      --model /models/llama-3.2-1b-instruct-q4_k_m.gguf
      --host 0.0.0.0
      --port 8080
      --ctx-size 2048
      --n-predict 128
      --threads 4
    networks:
      - llm-obs-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # FastAPI Monitor Service
  monitor:
    build:
      context: ./monitor
      dockerfile: Dockerfile
    container_name: llm-obs-monitor
    ports:
      - "8000:8000"
    environment:
      - LLM_URL=http://llamacpp:8080
      - LLM_MODEL=llama-3.2-1b-instruct
      - MONITOR_INTERVAL=30
      - TEST_PROMPT=What is 2+2?
      - EXPECTED_ANSWER=4
      - LOG_LEVEL=INFO
    depends_on:
      llamacpp:
        condition: service_healthy
    networks:
      - llm-obs-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: llm-obs-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    depends_on:
      - monitor
    networks:
      - llm-obs-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: llm-obs-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - llm-obs-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  llm-obs-network:
    driver: bridge

